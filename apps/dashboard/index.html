    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    />

    <style>
      body { background-color: #0A0A0A; margin: 0; }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        user-select: none;
        color: #FF9D63;
      }
      .login-icon {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        user-select: none;
        color: #FFFFFF;
      }
      .gradient-border-glow:focus-within {
        box-shadow: 0 0 0 1px rgba(255, 179, 179, 0.5), 0 0 8px rgba(168, 2, 40, 0.3);
        border-color: #ffb3b3;
      }
      .btn-gradient {
        background-color: rgba(255, 255, 255, 0.9);
        color: #000;
      }
      .btn-gradient:hover { background-color: #ffffff; }

      :root {
        --text-secondary: #888888;
        --accent-orange: #FF9D63;
      }
      .accent-orange {
        color: var(--accent-orange);
      }
      .bg-accent-orange {
        background-color: var(--accent-orange);
      }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }

      /* Floorplan styles */
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .spin-slow { animation: spin 4s linear infinite; }
      .glow-active { box-shadow: 0 0 20px 8px rgba(255, 204, 0, 0.6); background-color: rgba(255,204,0,0.8); }
      .glow-inactive { box-shadow: inset 0 0 5px rgba(255,255,255,0.2); background-color: rgba(255,255,255,0.1); }
      .room-panel {
        background-color: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        position: relative;
      }
      .floor-grid {
        background-image:
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 20px 20px;
      }
      .floor-grid-wood {
        background-image: linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
        background-size: 40px 100%;
      }
      .door-arc {
        width: 40px;
        height: 40px;
        border-top: 1px solid rgba(255,255,255,0.3);
        border-right: 1px solid rgba(255,255,255,0.3);
        border-radius: 0 40px 0 0;
        position: absolute;
      }
      .door-line {
        width: 40px;
        height: 1px;
        background-color: rgba(255,255,255,0.5);
        position: absolute;
      }
      .window-line {
        height: 4px;
        background-color: rgba(100, 200, 255, 0.3);
        border: 1px solid rgba(100, 200, 255, 0.5);
        position: absolute;
      }
      .desk {
        width: 80px;
        height: 50px;
        background-color: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 4px;
        position: absolute;
      }
      .monitor {
        width: 30px;
        height: 8px;
        background-color: rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 2px;
        position: absolute;
      }
      .keyboard {
        width: 20px;
        height: 6px;
        background-color: rgba(255,255,255,0.1);
        position: absolute;
      }
      .chair {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background-color: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.2);
        position: absolute;
      }
      .sofa {
        width: 30px;
        background-color: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 4px;
        position: absolute;
      }
      .table-fp {
        background-color: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.1);
        position: absolute;
      }
      .plant {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background-color: rgba(50, 150, 50, 0.2);
        border: 1px dashed rgba(50, 200, 50, 0.4);
        position: absolute;
      }
    </style>
  </head>
  <body class="bg-bg-deep">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
